name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bun run build

      - name: node --help
        run: node dist/bin/specrunner.js --help

      - name: node doctor (startup smoke test)
        run: node dist/bin/specrunner.js doctor --json || true

      - name: Check for Bun-specific API imports in dist/
        run: |
          ! grep -rE "from ['\"]bun:" dist/

      - run: bun run typecheck

      - run: bun run test
