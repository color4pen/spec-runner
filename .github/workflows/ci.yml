name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "specrunner/changes/**"
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - run: bun install --frozen-lockfile

      - run: bun run build

      - name: node --help
        run: node dist/specrunner.js --help

      - name: node doctor (startup smoke test)
        run: node dist/specrunner.js doctor --json || true

      - name: Check for Bun-specific API imports in dist/
        run: |
          ! grep -rE "from ['\"]bun:" dist/

      - run: bun run typecheck

      - run: bun run lint

      - run: bun run test

      - name: Package smoke (first-contact contract assertions)
        run: bash scripts/smoke/package-smoke.sh
