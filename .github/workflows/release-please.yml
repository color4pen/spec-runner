name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/release-please-action@e4dc86ba9405554aeba3c6bb2d169500e7d3b4ee # v4
        with:
          # PAT を使う（GITHUB_TOKEN ではない）: GITHUB_TOKEN で打った tag は
          # 連鎖 workflow を発火しないため publish.yml が走らない。PAT 由来の
          # tag-push は publish.yml (specrunner-v* trigger) を発火させる。
          # 必要 secret: RELEASE_PLEASE_TOKEN（Contents:write + Pull requests:write）
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
