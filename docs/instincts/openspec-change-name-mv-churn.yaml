id: openspec-change-name-mv-churn
trigger: "npx openspec new change でチェンジを作成し、日付プレフィックス付きのディレクトリ名を使いたいとき"
pattern: "`npx openspec new change \"bootstrap-detection-on-register\"` は日付プレフィックスなしの `openspec/changes/bootstrap-detection-on-register/` を生成する。request-execute ワークフローは `2026-04-25-bootstrap-detection-on-register` のように日付プレフィックス付きを期待するため、作成直後に `mv` で rename が 3 回発生（[13] mv、[15] mv 失敗リトライ、[31] 再度 mv）。これは openspec CLI の命名規則とワークフローの命名規則の不一致が原因"
action: "openspec new change を実行した直後に、ワークフローが期待する日付プレフィックス付き名前へ即座に rename する。理想的には openspec CLI 呼び出し時に --name オプションで完全な名前を指定するか、ワークフロー側で rename を自動化する"
confidence: 0.6
occurrences: 1
