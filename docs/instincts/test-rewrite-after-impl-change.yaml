id: test-rewrite-after-impl-change
trigger: "実装アーキテクチャを変更した後にテストを書くとき"
pattern: "テストファイルが Write 直後に再度 Write で上書きされるパターンが継続。Phase 2 では data-integrity.test.ts, security-authed.test.ts, api-contract.test.ts、bootstrap フェーズでは bootstrap.test.ts（entries 1039 で Write → 1041 で即 Write 上書き）。2026-04-25 セッションでは bootstrap-detection-on-register.test.ts が Write[70] → test 実行失敗 → Write[78] で全面書き直し。テスト実行で既存テストとの干渉（git stash → pop）も発生。実装のインターフェース確定前にテストを書くと無駄になる"
action: "テストは実装のインターフェースが安定した後に書く。特に Server Actions のシグネチャが review-feedback で変更される可能性がある場合、テスト作成を code-review 後に回す"
