id: structured-agent-decision-flow
trigger: "request-execute / spec-review / code-review / test-case-generation ワークフローを実行するとき"
pattern: |
  agent phase の各段階で構造化された決定書ファイルが生成される pattern。
  2026-04-24 セッション:
  - architect.md, spec-reviewer.md, spec-fixer.md, test-case-generator.md,
    implementer.md, build-fixer.md, code-reviewer.md, code-fixer.md を Write
  2026-04-25 セッション:
  - architect.md(line 62), spec-reviewer.md(line 63), spec-fixer.md(line 73),
    test-case-generator.md(line 79), implementer.md(line 105),
    build-fixer.md(line 182, 3回 Edit), code-reviewer.md(line 246) の 7 ファイルを Write
  - build-fixer.md が 3回 Edit(lines 191,209,222) されており、
    verification→fix の iteration ごとに判断根拠が更新された

  決定書ファイルは各エージェント / fixer の「指示・判定根拠」を記録する役割。
  requests/{status}/{request}/decisions/ 配下に集約される。
  OpenSpec workflow では、各 agent の output contract として存在が期待される。
action: |
  agent から decision / findings output を受け取った際、immediately に decisions/ 下に
  以下の形式で整理する:
  - decisions/{agent-role}.md: architect, spec-reviewer, code-reviewer, implementer など
  - decisions/{fixer-role}.md: spec-fixer, code-fixer, build-fixer など

  この構造により、後続の continuous-learning / distill-learnings でパターン抽出が容易になる。
  決定書がない = agent output が lost / 形式が不統一の sign。
confidence: 0.5
occurrences: 2
first_seen: 2026-04-24
last_seen: 2026-04-25
projects: [spec-runner]
scope: project
source: session-observation
